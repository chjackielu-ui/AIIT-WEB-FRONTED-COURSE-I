<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>JavaScript弹窗区别演示</title>
    <style>
        body {
            font-family: "Microsoft YaHei", Arial, sans-serif;
            background-color: #f5f5f5;
            padding: 40px;
        }

        .box {
            width: 500px;
            margin: 0 auto;
            background-color: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px #ccc;
        }

        h2 {
            text-align: center;
        }

        button {
            width: 100%;
            height: 45px;
            margin-top: 15px;
            font-size: 16px;
            cursor: pointer;
        }

        p {
            line-height: 28px;
        }

        #result {
            margin-top: 20px;
            padding: 15px;
            background-color: #eef5ff;
            border-left: 5px solid #409eff;
        }
    </style>
</head>
<body>

    <div class="box">
        <h2>JavaScript 弹窗函数演示</h2>

        <p><b>alert()</b>：只负责弹出提示信息。</p>
        <p><b>prompt()</b>：弹出输入框，可以让用户输入内容。</p>
        <p><b>confirm()</b>：弹出确认框，用户可以选择“确定”或“取消”。</p>

        <button onclick="showAlert()">体验 alert()</button>
        <button onclick="showPrompt()">体验 prompt()</button>
        <button onclick="showConfirm()">体验 confirm()</button>

        <div id="result">
            这里会显示你的操作结果。
        </div>
    </div>

    <script>
        function showAlert() {
            alert("这是 alert() 弹出的提示框，只能点击确定。");

            document.getElementById("result").innerHTML = "你刚才体验的是 alert()，它只用来显示提示信息。";
        }

        function showPrompt() {
            var name = prompt("请输入你的名字：");

            if (name === null) {
                document.getElementById("result").innerHTML = "你点击了取消，没有输入内容。";
            } else if (name === "") {
                document.getElementById("result").innerHTML = "你点击了确定，但是没有输入任何内容。";
            } else {
                document.getElementById("result").innerHTML = "你输入的名字是：" + name;
            }
        }

        function showConfirm() {
            var answer = confirm("你确定要继续学习 JavaScript 吗？");

            if (answer === true) {
                document.getElementById("result").innerHTML = "你点击了确定，confirm() 返回 true。";
            } else {
                document.getElementById("result").innerHTML = "你点击了取消，confirm() 返回 false。";
            }
        }
    </script>

</body>
</html>
