<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table 表格</title>
</head>

<body>
    <p>hello</p>
    <a href="https://www.baidu.com">you can click this to jump to baidu</a>
    <p>
        <!-- table 表格 tr行 td列 -->
    <table border="1" cellspacing="0" width="500">
        <tr>
            <td>JacksonWang</td>
            <td>Jay</td>
            <td>Adole</td>
        </tr>
        <tr>
            <td>Apple</td>
            <td>Samsung</td>
            <td>Huawei</td>
        </tr>
        <tr>
            <td>Nike</td>
            <td>Adidas</td>
            <td>Converse</td>
            <td>New Balance</td>
            <td>Reebok</td>
        </tr>
    </table>
    <p>
    <table border="1">
        <caption
            style="font-size: 1.5em; font-weight: bold; margin-bottom: 15px; 
                 background: linear-gradient(45deg, #ff9a9e, #fad0c4, #fbc2eb, #a6c1ee, #c2e9fb, #ff9a9e);
                 background-size: 300% 300%;
                 -webkit-background-clip: text;
                 background-clip: text;
                 -webkit-text-fill-color: transparent;
                 animation: shine 3s infinite linear, glow 2s infinite alternate;
                 display: inline-block;
                 position: relative;
                 filter: drop-shadow(0 0 6px #fff) drop-shadow(0 0 12px #fbc2eb) drop-shadow(0 0 18px #a6c1ee) drop-shadow(0 0 24px #c2e9fb);
                 text-shadow: 0 0 10px rgba(255,255,255,0.8), 0 0 20px rgba(255,154,158,0.6), 0 0 30px rgba(166,193,238,0.4);">
            古诗词鉴赏
        </caption>
        <style>
            @keyframes shine {
                0% {
                    background-position: 0% 50%;
                }

                100% {
                    background-position: 100% 50%;
                }
            }

            @keyframes glow {
                0% {
                    filter: drop-shadow(0 0 6px #fff) drop-shadow(0 0 12px #fbc2eb) drop-shadow(0 0 18px #a6c1ee) drop-shadow(0 0 24px #c2e9fb);
                    text-shadow: 0 0 10px rgba(255, 255, 255, 0.8), 0 0 20px rgba(255, 154, 158, 0.6), 0 0 30px rgba(166, 193, 238, 0.4);
                }

                100% {
                    filter: drop-shadow(0 0 8px #fff) drop-shadow(0 0 16px #fbc2eb) drop-shadow(0 0 24px #a6c1ee) drop-shadow(0 0 32px #c2e9fb) drop-shadow(0 0 40px rgba(255, 154, 158, 0.8));
                    text-shadow: 0 0 15px rgba(255, 255, 255, 0.9), 0 0 30px rgba(255, 154, 158, 0.8), 0 0 45px rgba(166, 193, 238, 0.6), 0 0 60px rgba(194, 233, 251, 0.4);
                }
            }
        </style>
        <tr>
            <td style="text-align: center;">水调歌头 宋·苏轼</td>
        </tr>
        <tr>
            <td>明月几时有，</td>
            <td>把酒问青天</td>
        </tr>
        <tr>
            <td>不知天上宫阙</td>
            <td>今夕是何年</td>
        </tr>
    </table>

    <p>
    <table border="1">
        <tr>
            <td style="text-align: center; font-weight: bold; font-size: 1.2em; background-color: #f2f2f2; padding: 8px;"
                colspan="4">
                学生成绩管理系统
            </td>
        </tr>
        <tr style="background-color: #e6f0ff;">
            <td style="padding: 6px; text-align: center;">序号</td>
            <td style="padding: 6px; text-align: center;">姓名</td>
            <td style="padding: 6px; text-align: center;">年龄</td>
            <td style="padding: 6px; text-align: center;">成绩</td>
        </tr>
    </table>

    <p>
    <table border="1" cellspacing="15" cellpadding="20">
        <caption style="font-size: 1.2em; font-weight: bold; margin-bottom: 10px;">
            My Hobblies
        </caption>
        <thead>
            <tr>
                <th>ID</th>
                <th>Singer</th>
                <th>Fruit</th>
                <th>Game</th>
                <th>Spot</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td>Jay</td>
                <td>Apple</td>
                <td>LOL</td>
                <td>Paris</td>
            </tr>
            <tr>
                <td>2</td>
                <td>Billie</td>
                <td>Orange</td>
                <td>CF</td>
                <td>Shanghaii</td>
            </tr>
        </tbody>
    </table>

<!-- 行列、行合并、列合并、caption -->



</body>

</html>
