<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        p{
            font-size: 30px;
            color: red;
            font-weight: bold;
            font-style: italic;
            font-family: '楷体', Courier, monospace;
        }
        .f1{
            font-size: 20px;
            color: blue;
            font-weight: normal;
            font-style: normal;
            font-family: '宋体', Courier, monospace;
            line-height: 50px;
            letter-spacing: 50px;
        }
        .f2{
            font-size: 20px;
            color: red;
            font-weight: bold;
            font-style: italic;
            font-family: '楷体', Courier, monospace;
            line-height: 30px;
            letter-spacing: 30px;
        }
        .f3{
            text-transform: capitalize;
            font-size: 20px;
            color: green; 
        }
        .f4{
            font-size: 90px;
            color: yellow;
            font-weight: bold;
            font-style: italic;
            font-family: '楷体', Courier, monospace;
            line-height: 30px;
            letter-spacing: 30px;
            text-align: center;
            text-indent: 2em;
            text-shadow: 2px 2px 2px #000;
            text-decoration-line: underline;
        }
    </style>
</head>
<body>
    <p>我是font</p>
    <div class="f1">4月10日，国家主席习近平在国家主席会议中表示，中国将继续努力，为世界做出更多贡献</div>
    <div class="f2">行高</div>

</body>
