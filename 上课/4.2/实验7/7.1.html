<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>古诗排版</title>
    <style>
        * {
            text-align: center;
            text-shadow: 6px 6px 6px rgba(253, 228, 0, 0.945);
        }

        h1 {
            font-size: 80px;
            color: rgb(3, 91, 255);
            font-family: "宋体";

        }

        h6 {
            font-size: 30px;
            font-family: "宋体";
            font-weight: bold;
            color: rgb(255, 162, 0);
        }

        p {
            font-size: 15px;
            font-family: "隶书";
        }

        .p2 {
            font-size: 150%;
            color: rgb(18, 161, 213);
        }

        .p3 {
            font-size: 250%;
            color: rgb(141, 205, 30);
        }

        .p4 {
            font-size: 350%;
            color: rgb(196, 51, 51);
        }

        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://typora910.oss-cn-nanjing.aliyuncs.com/img_for_typora/%E5%B1%8F%E5%B9%95%E6%88%AA%E5%9B%BE%202026-04-02%20144306.png');
            background-size: cover;
            background-position: center;
            z-index: -1;
            opacity: 0.5;
        }
    </style>
</head>

<body>
    <H1>早发白帝城</H1>
    <h6>李白</h6>
    <p>朝辞白帝彩云间，</p>
    <p class="p2">千里江陵一日还。</p>
    <p class="p3">两岸猿声啼不住，</p>
    <p class="p4">轻舟已过万重山。</p>
    <div class="background"></div>

</body>

</html>
