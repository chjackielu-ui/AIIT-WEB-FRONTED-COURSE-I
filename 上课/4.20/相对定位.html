<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* position: relative相对定位 absolute绝对定位 */
        /* 绝对定位：父相子绝 */
        .father {
            width: 400px;
            height: 400px;
            border: 2px solid rgb(4, 156, 52);
            position: relative;
        }
        .son {
            width: 100px;
            height: 100px;
            background-color: rgb(60, 192, 232);
            position: fixed;
            top: 50px;
            left: 500px;
        }
        .son2 {
            width: 100px;
            height: 100px;
            background-color: rgb(255, 166, 0);
            position: absolute;
            top: 50px;
            left: 50px;
            z-index: 1;
        }
        .son3 {
            width: 30px;
            height: 30px;
            background-color: rgb(255, 0, 0);
            position: absolute;
            top: 200px;
            left: 60px;
            z-index: 2;
        }
        .son4 {
            width: 50px;
            height: 50px;
            background-color: rgb(0, 255, 0);
            position: absolute;
            top: 100px;
            left: 100px;
            z-index: 3;
        }
        .son5 {
            width: 20px;
            height: 20px;
            background-color: rgb(255, 255, 0);
            position: absolute;
            top: 150px;
            left: 150px;
            z-index: 4;
        }
    </style>
</head>
<body>
    <div class="father">
        <div class="son"></div>
        <div class="son2"></div>
        <div class="son3"></div>
        <div class="son4"></div>
        <div class="son5"></div>
    </div>
</body>
</html>
