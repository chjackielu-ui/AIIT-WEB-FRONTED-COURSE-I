<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图9-1 卢酉杰</title>
    <style>
        h3 {
            text-align: center;
            color: rgb(28, 169, 66);
        }

        .p1 {
            font-size: 20px;
            font-style: normal;
            font-family: "宋体";
        }

        .p2 {
            font-size: 200%;
            font-style: italic;
            font-family: "隶书";
        }

        .p3 {
            font-size: x-small;
            font-style: oblique;
            font-family: "宋体";
        }

        .p4 {
            font-size: xx-large;
            font-style: oblique;
            font-family: "黑体";
        }
    </style>
</head>

<body>
    <h3>Welcome to my website!</h3>
    <hr>
    <p class="p1"> This is 字体大小20px、字体正常、宋体</p>
    <p class="p2"> This is 字体大小200%、字体斜体、隶书</p>
    <p class="p3"> This is 字体大小x-small、字体歪斜体、宋体</p>
    <p class="p4"> This is 字体大小xx-large、字体歪斜体、黑体</p>
</body>

</html>
