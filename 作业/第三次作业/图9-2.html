<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>设置字体变体、粗细、复合属性</title>
    <style>
        h2 {
            text-align: center;
        }

        .p01 {
            font-weight: normal;
        }

        .p02 {
            font-weight: lighter;
        }


        .p03 {
            font-variant: small-caps;
            font-weight: bold;
        }

        .p04 {
            font: 600 italic 28px/50px "幼圆";
        }

        .p05 {
            font: italic bolder small-caps 24px/1.5em "黑体";
        }
    </style>
</head>

<body>
    <h2>欢迎来到AIIT</h2>
    <hr>
    <p class="p01">此段文字正常显示Welcome to you!欢迎来到安徽信息工程学院！</p>
    <p class="p02">此段文字Welcome to you!欢迎来到安徽信息工程学院！正常、较细字体。</p>
    <p class="p03">设置小型大写字母、字体标准粗体。 Welcome to you!欢迎来到安徽信息工程学院！</p>
    <p class="p04">设置字体粗细度为600、斜体、大小28px、行高50px、字体幼圆。</p>
    <p class="p04">Welcome to you!欢迎来到安徽信息工程学院！</p>
    <p class="p05">设置字体风格斜体、特粗、小型大写字母HTML、字号24px/行高1.5em、字体黑体。</p>
    <p class="p05">Welcome to you!欢迎来到安徽信息工程学院！</p>
</body>

</html>
