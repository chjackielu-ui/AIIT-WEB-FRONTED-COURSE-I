<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录页面效果</title>
</head>
<body>
    <fieldset>
        <legend align="center" style="font-size: 20px; padding: 5px 20px;">登录页面</legend>
        <form action="" align="center">
            账号：<input type="text" name="username" id="username" placeholder="请输入账号" align="center"><br>
            密码：<input type="password" name="password" id="password" placeholder="请输入密码" align="center"><br>
            类型：<input type="radio" name="type" id="type1" >管理员
            <input type="radio" name="type" id="type2" checked >普通用户
            <br>
            <input type="checkbox" name="remember" id="remember">记住密码
            <input type="checkbox" name="autologin" id="autologin">自动登录
            <br>
            <input type="submit" value="登录">
            <input type="reset" value="重置">
        </form>
    </fieldset>
</body>
</html>
